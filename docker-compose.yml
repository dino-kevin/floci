services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - floci-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock  # Fix: Added to give Floci access to the host's Docker engine
    networks:
      - floci-network
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - floci
    networks:
      - floci-network
    restart: unless-stopped

networks:
  floci-network:
    driver: bridge

volumes:
  floci-data:
