services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - floci-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - floci-network
    restart: unless-stopped

  # Add the UI container here
  floci-ui:
    image: floci/floci-ui:latest
    ports:
      - "4500:4500"
    environment:
      # Tells the UI how to talk to the core emulator internally
      - FLOCI_ENDPOINT=http://floci:4566
    depends_on:
      - floci
    networks:
      - floci-network
    restart: unless-stopped

networks:
  floci-network:
    driver: bridge

volumes:
  floci-data:
